<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenShop Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="modal">
        <button class="close-btn" type="button">×</button>

        <div class="tabs">
            <button class="tab active" id="loginTabBtn" type="button">Login</button>
            <span>|</span>
            <button class="tab" id="registerTabBtn" type="button">Register</button>
        </div>

        <div class="forms">

            <form class="form active-form" id="loginForm" action="#" method="post">
                <p class="subtitle">Enter your email and password to login.</p>

                <input type="email" name="login-email" placeholder="Enter your email address" required>

                <div class="password-wrap">
                    <input type="password" name="login-password" id="loginPassword" placeholder="Password" required>
                    <button type="button" class="eye-btn" onclick="togglePassword('loginPassword', this)">👁</button>
                </div>

                <button type="submit" class="main-btn">Login</button>

                <div class="separator">
                    <span>Or login with</span>
                </div>

                <a href="https://accounts.google.com/" class="social-btn" target="_blank">
                    <img src="images/google.png" alt="Google">
                    Continue with Google
                </a>

                <a href="https://www.facebook.com/" class="social-btn" target="_blank">
                    <img src="images/facebook.png" alt="Facebook">
                    Continue with Facebook
                </a>
            </form>

            <form class="form" id="registerForm" action="#" method="post">
                <p class="subtitle">Enter your email and password to register.</p>

                <input type="text" name="username" placeholder="Username" required>
                <input type="email" name="register-email" placeholder="Enter your email address" required>

                <div class="password-wrap">
                    <input type="password" name="register-password" id="registerPassword" placeholder="Password" required>
                    <button type="button" class="eye-btn" onclick="togglePassword('registerPassword', this)">👁</button>
                </div>

                <div class="password-wrap">
                    <input type="password" name="confirm-password" id="confirmPassword" placeholder="Confirm Password" required>
                    <button type="button" class="eye-btn" onclick="togglePassword('confirmPassword', this)">👁</button>
                </div>

                <button type="submit" class="main-btn">Register</button>

                <div class="separator">
                    <span>Or register with</span>
                </div>

                <a href="https://accounts.google.com/" class="social-btn" target="_blank">
                    <img src="images/google.png" alt="Google">
                    Continue with Google
                </a>

                <a href="https://www.facebook.com/" class="social-btn" target="_blank">
                    <img src="images/facebook.png" alt="Facebook">
                    Continue with Facebook
                </a>
            </form>

        </div>
    </div>

    <script>
        const loginTabBtn = document.getElementById("loginTabBtn");
        const registerTabBtn = document.getElementById("registerTabBtn");
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");

        loginTabBtn.addEventListener("click", function () {
            loginForm.classList.add("active-form");
            registerForm.classList.remove("active-form");

            loginTabBtn.classList.add("active");
            registerTabBtn.classList.remove("active");
        });

        registerTabBtn.addEventListener("click", function () {
            registerForm.classList.add("active-form");
            loginForm.classList.remove("active-form");

            registerTabBtn.classList.add("active");
            loginTabBtn.classList.remove("active");
        });

        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);

            if (input.type === "password") {
                input.type = "text";
                button.textContent = "🙈";
            } else {
                input.type = "password";
                button.textContent = "👁";
            }
        }
    </script>

</body>
</html>
